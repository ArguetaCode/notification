server.port=${SERVER_PORT:8084}

spring.application.name=notification-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:55432}/${DB_NAME:campusenroll}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:campus}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:campus123}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${NOTIFICATION_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=campusenroll

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:${RABBITMQ_HOST:localhost}}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:${RABBITMQ_PORT:5672}}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:${RABBITMQ_USERNAME:campus}}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:${RABBITMQ_PASSWORD:campus123}}

spring.data.redis.host=${SPRING_REDIS_HOST:${REDIS_HOST:localhost}}
spring.data.redis.port=${SPRING_REDIS_PORT:${REDIS_PORT:6379}}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
logging.level.org.hibernate.SQL=${NOTIFICATION_HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${NOTIFICATION_HIBERNATE_BIND_LOG_LEVEL:WARN}

